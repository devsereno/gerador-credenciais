
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerar Credenciais</title>
    <link class="no-print" rel="icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968890.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        
        /* O conteúdo interno do cartão é MODO CLARO FIXO */
        .card {
            width: 85.6mm;
            height: 53.98mm;
            margin: 15px auto;
            border: 2px solid #0ea5e9;
            background: #ffffff !important;
            color: #000000 !important;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.3);
        }
        .barcode { width: 100% !important; max-width: 100% !important; height: auto !important; }
        
        /* REGRAS DE IMPRESSÃO OTOMIZADAS PARA PAGINAÇÃO ÚNICA */
        @media print {
            /* Força o tamanho do papel e zera margens padrões do navegador */
            @page { 
                size: A4 portrait;
                margin: 0 !important; 
            }

            body.modo-impressao > *:not(#printArea),
            body.modo-impressao #modalBg,
            body.modo-impressao #modalHeader,
            body.modo-impressao #modalFooter,
            .no-print {
                display: none !important;
            }

            body.modo-impressao {
                background: white !important;
                color: black !important;
                margin: 0 !important;
                padding: 0 !important;
                height: 100vh !important;
                overflow: hidden !important;
            }

            body.modo-impressao #printArea {
                position: static !important;
                display: block !important;
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
                overflow: hidden !important;
                height: 100% !important;
            }

            body.modo-impressao #modalContent {
                position: static !important;
                background: white !important;
                border: none !important;
                box-shadow: none !important;
                max-height: none !important;
                overflow: hidden !important;
                width: 100% !important;
            }

            body.modo-impressao #modalPrint {
                background: white !important;
                overflow: hidden !important;
                padding: 10mm 0 0 0 !important; /* Pequeno recuo apenas no topo da página */
                margin: 0 !important;
            }

            /* Reduzido o espaço entre os cartões para não estourarem a folha A4 */
            .card {
                margin: 4mm auto !important; 
                box-shadow: none !important; 
                page-break-inside: avoid;
                page-break-after: avoid;
            }
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center relative">

    <div id="appContainer" class="w-full max-w-lg p-6">
        <div class="absolute top-4 right-4 no-print">
            <button onclick="toggleTema()" id="themeBtn" class="bg-zinc-900 border border-zinc-800 text-zinc-300 px-4 py-2 rounded-xl text-sm font-medium hover:bg-zinc-800 transition flex items-center gap-2 shadow-lg">
                ☀️ Modo Claro
            </button>
        </div>

        <div class="text-center mb-8">
            <h1 id="mainTitle" class="text-4xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
                🔧 Gerar Credenciais
            </h1>
            <p id="mainSubtitle" class="text-zinc-400 mt-2">Code 128 • Cartões de Crédito</p>
        </div>

        <div id="formContainer" class="space-y-6 bg-zinc-900 p-8 rounded-2xl border border-zinc-800 shadow-2xl transition-colors duration-300">
            <div>
                <label id="labelNome" class="block text-sm font-medium text-zinc-400 mb-2">Nome / Usuário</label>
                <input type="text" id="nome" 
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-500 text-white transition-colors duration-300"
                       placeholder="Ex: Ricardo Junior">
            </div>
            
            <div>
                <label id="labelSenha" class="block text-sm font-medium text-zinc-400 mb-2">Senha</label>
                <input type="text" id="senha" 
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-500 text-white transition-colors duration-300"
                       placeholder="Digite sua senha">
            </div>

            <div class="flex gap-4">
                <button onclick="gerarCredenciais()" 
                        class="flex-1 bg-cyan-500 hover:bg-cyan-600 text-zinc-950 transition py-4 rounded-2xl font-semibold text-lg shadow-lg shadow-cyan-500/20">
                    Gerar Cartões
                </button>
                
                <button onclick="resetForm()" id="resetBtn"
                        class="px-8 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-white rounded-2xl font-medium transition">
                    Reset
                </button>
            </div>
        </div>
    </div>

    <div id="printArea" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div id="modalBg" class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="fecharModal()"></div>
        
        <div id="modalContent" class="relative bg-zinc-900 border border-zinc-800 w-full max-w-xl max-h-[90vh] rounded-3xl shadow-2xl flex flex-col z-10 overflow-hidden transition-colors duration-300">
            
            <div id="modalHeader" class="p-6 border-b border-zinc-800 flex justify-between items-center bg-zinc-900">
                <h2 class="text-xl font-semibold text-cyan-400">Cartões Gerados</h2>
                <button onclick="fecharModal()" class="text-zinc-400 hover:text-white text-2xl font-bold">&times;</button>
            </div>

            <div id="modalPrint" class="p-6 overflow-y-auto flex-1 bg-white text-center space-y-4">
                
                <div class="card text-left">
                    <div class="absolute inset-0 flex flex-col items-center justify-center p-4">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-cyan-500 text-xl">⚙️</span>
                            <span class="text-sm font-bold tracking-widest text-zinc-500">GERAR CREDENCIAIS</span>
                        </div>
                        <svg id="barcodeNome" class="barcode"></svg>
                        <div id="textoNome" class="mt-4 text-sm font-bold tracking-widest text-zinc-800"></div>
                    </div>
                </div>

                <div class="card text-left">
                    <div class="absolute inset-0 flex flex-col items-center justify-center p-4">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-cyan-500 text-xl">⚙️</span>
                            <span class="text-sm font-bold tracking-widest text-zinc-500">GERAR CREDENCIAIS</span>
                        </div>
                        <svg id="barcodeSenha" class="barcode"></svg>
                        <div id="textoSenhaMascarada" class="mt-4 text-sm font-bold tracking-[4px] text-zinc-800"></div>
                    </div>
                </div>
            </div>

            <div id="modalFooter" class="p-6 border-t border-zinc-800 bg-zinc-900/50 flex flex-col sm:flex-row gap-3">
                <button onclick="imprimirCartoes()" class="flex-1 bg-cyan-500 hover:bg-cyan-600 text-zinc-950 font-semibold py-3 rounded-xl transition flex justify-center items-center gap-2">
                    🖨️ Imprimir
                </button>
                <button onclick="gerarPDF()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-xl transition flex justify-center items-center gap-2">
                    📄 Salvar PDF
                </button>
                <button onclick="fecharModal()" id="modalCloseBtn" class="sm:w-auto px-6 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 py-3 rounded-xl transition">
                    Fechar
                </button>
            </div>
        </div>
    </div>

    <script>
        let modoEscuro = true;

        function toggleTema() {
            modoEscuro = !modoEscuro;
            const body = document.body;
            const themeBtn = document.getElementById("themeBtn");
            const formContainer = document.getElementById("formContainer");
            const inputs = [document.getElementById("nome"), document.getElementById("senha")];
            const labels = [document.getElementById("labelNome"), document.getElementById("labelSenha")];
            const resetBtn = document.getElementById("resetBtn");
            const subtitle = document.getElementById("mainSubtitle");
            
            const modalContent = document.getElementById("modalContent");
            const modalHeader = document.getElementById("modalHeader");
            const modalFooter = document.getElementById("modalFooter");
            const modalCloseBtn = document.getElementById("modalCloseBtn");

            if (modoEscuro) {
                body.className = "bg-zinc-950 text-white min-h-screen flex items-center justify-center relative";
                themeBtn.className = "bg-zinc-900 border border-zinc-800 text-zinc-300 px-4 py-2 rounded-xl text-sm font-medium hover:bg-zinc-800 transition flex items-center gap-2 shadow-lg";
                themeBtn.innerHTML = "☀️ Modo Claro";
                formContainer.className = "space-y-6 bg-zinc-900 p-8 rounded-2xl border border-zinc-800 shadow-2xl transition-colors duration-300";
                subtitle.className = "text-zinc-400 mt-2";
                resetBtn.className = "px-8 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-white rounded-2xl font-medium transition";
                
                inputs.forEach(i => i.className = "w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-500 text-white transition-colors duration-300");
                labels.forEach(l => l.className = "block text-sm font-medium text-zinc-400 mb-2");

                modalContent.className = "relative bg-zinc-900 border border-zinc-800 w-full max-w-xl max-h-[90vh] rounded-3xl shadow-2xl flex flex-col z-10 overflow-hidden transition-colors duration-300";
                modalHeader.className = "p-6 border-b border-zinc-800 flex justify-between items-center bg-zinc-900";
                modalFooter.className = "p-6 border-t border-zinc-800 bg-zinc-900/50 flex flex-col sm:flex-row gap-3";
                modalCloseBtn.className = "sm:w-auto px-6 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 py-3 rounded-xl transition";
            } else {
                body.className = "bg-zinc-100 text-zinc-900 min-h-screen flex items-center justify-center relative";
                themeBtn.className = "bg-white border border-zinc-300 text-zinc-700 px-4 py-2 rounded-xl text-sm font-medium hover:bg-zinc-50 transition flex items-center gap-2 shadow-md";
                themeBtn.innerHTML = "🌙 Modo Escuro";
                formContainer.className = "space-y-6 bg-white p-8 rounded-2xl border border-zinc-200 shadow-xl transition-colors duration-300";
                subtitle.className = "text-zinc-500 mt-2";
                resetBtn.className = "px-8 bg-zinc-200 hover:bg-zinc-300 border border-zinc-300 text-zinc-700 rounded-2xl font-medium transition";

                inputs.forEach(i => i.className = "w-full bg-zinc-50 border border-zinc-300 rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-500 text-zinc-900 transition-colors duration-300");
                labels.forEach(l => l.className = "block text-sm font-medium text-zinc-600 mb-2");

                modalContent.className = "relative bg-white border border-zinc-200 w-full max-w-xl max-h-[90vh] rounded-3xl shadow-2xl flex flex-col z-10 overflow-hidden transition-colors duration-300";
                modalHeader.className = "p-6 border-b border-zinc-200 flex justify-between items-center bg-white";
                modalFooter.className = "p-6 border-t border-zinc-200 bg-zinc-50 flex flex-col sm:flex-row gap-3";
                modalCloseBtn.className = "sm:w-auto px-6 bg-zinc-200 hover:bg-zinc-700 text-zinc-300 py-3 rounded-xl transition";
            }
        }

        function gerarCredenciais() {
            const nomeInput = document.getElementById("nome").value.trim();
            const senhaInput = document.getElementById("senha").value.trim();
            
            if (!nomeInput || !senhaInput) {
                alert("❌ Preencha o Nome e a Senha!");
                return;
            }

            const nome = nomeInput.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            document.getElementById("textoNome").textContent = nome;
            document.getElementById("textoSenhaMascarada").textContent = "*".repeat(Math.max(senhaInput.length, 8));

            const altura = Math.max(26, 38 - (nome.length * 0.35));

            JsBarcode("#barcodeNome", nome, {
                format: "CODE128",
                width: 1.35,
                height: altura,
                displayValue: false,
                margin: 8,
                background: "transparent",
                lineColor: "#000000"
            });

            JsBarcode("#barcodeSenha", senhaInput, {
                format: "CODE128",
                width: 1.35,
                height: Math.max(26, 38 - (senhaInput.length * 0.35)),
                displayValue: false,
                margin: 8,
                background: "transparent",
                lineColor: "#000000"
            });

            document.getElementById("printArea").classList.remove("hidden");
        }

        function fecharModal() {
            document.getElementById("printArea").classList.add("hidden");
        }

        function resetForm() {
            document.getElementById("nome").value = "";
            document.getElementById("senha").value = "";
            fecharModal();
        }

        function imprimirCartoes() {
            document.body.classList.add("modo-impressao");
            
            setTimeout(() => {
                window.print();
                document.body.classList.remove("modo-impressao");
            }, 100);
        }

        function gerarPDF() {
            const elemento = document.getElementById('modalPrint');
            const nomeArquivo = document.getElementById("textoNome").textContent || "credencial";

            const opt = {
                margin:       10,
                filename:     `credencial_${nomeArquivo.toLowerCase().replace(/\s+/g, '_')}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 3, useCORS: true }, 
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(elemento).save();
        }

        document.getElementById("senha").addEventListener("keypress", (e) => {
            if (e.key === "Enter") gerarCredenciais();
        });
    </script>
</body>
</html>
