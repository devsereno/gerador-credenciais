<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerar Credenciais</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968890.png" type="image/png">
    
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background: #f0f0f0;
            margin: 0;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        .logo-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .logo-header img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
        }
        h1 { 
            color: #1e3a8a; 
            margin: 0;
            font-size: 2.2em;
        }
        input, button {
            width: 100%;
            max-width: 500px;
            padding: 12px;
            margin: 10px 0;
            font-size: 18px;
            border-radius: 5px;
        }
        input { border: 2px solid #ccc; }
        button {
            background: #1e3a8a;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #0f2b6e; }

        .print-area { display: none; margin-top: 30px; }
        .card {
            width: 85.6mm;
            height: 53.98mm;
            margin: 20px auto;
            border: 3px solid #000;
            background: white;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .card-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
        }
        .card-title {
            font-size: 10pt;
            margin-bottom: 4mm;
            font-weight: bold;
            color: #1e3a8a;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .custom-icon { width: 26px; height: 26px; }
        .barcode { margin: 3mm 0 2mm 0; }
        .name-text {
            font-size: 11pt;
            font-weight: bold;
            text-transform: uppercase;
            padding: 0 8mm;
        }
        .senha-mascarada {
            font-size: 11pt;
            font-weight: bold;
            letter-spacing: 4px;
            color: #333;
        }
        .footer {
            margin-top: 40px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
            color: #666;
            font-size: 14px;
        }
        @media print {
            body * { visibility: hidden; }
            .print-area, .print-area * { visibility: visible; }
            .print-area { display: block; position: absolute; left: 0; top: 0; width: 100%; }
            .footer, button, .container > :not(.print-area) { display: none !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-header">
            <img src="https://picsum.photos/id/1015/200/200" alt="Logo" style="border-radius: 12px;">
            <h1>Gerar Credenciais</h1>
        </div>
        
        <label for="nome">Nome / Usuário:</label><br>
        <input type="text" id="nome" placeholder="Digite o nome" autocomplete="off">
        
        <label for="senha">Senha:</label><br>
        <input type="text" id="senha" placeholder="Digite a senha" autocomplete="off">
        
        <br><br>
        <button onclick="gerarCredenciais()">Gerar Cartões para Impressão</button>
        
        <div class="print-area" id="printArea">
            <h2 style="color:#1e3a8a; margin:20px 0;">Cartões Gerados — Pronto para Imprimir</h2>
            
            <!-- Cartão Nome -->
            <div class="card" id="cardNome">
                <div class="card-content">
                    <div class="card-title">
                        <svg class="custom-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#1e3a8a" stroke-width="1.8">
                            <path d="M12 2 L13.5 5.5 L17 4.5 L18.5 8 L22 9.5 L20 13 L22 16.5 L18.5 18 L17 21.5 L13.5 20.5 L12 24 L10.5 20.5 L7 21.5 L5.5 18 L2 16.5 L4 13 L2 9.5 L5.5 8 L7 4.5 L10.5 5.5 Z" />
                            <circle cx="12" cy="12" r="4" />
                            <polygon points="10,9 17,12 10,15" fill="#1e3a8a" />
                        </svg>
                        Gerar Credenciais
                    </div>
                    <svg id="barcodeNome" class="barcode"></svg>
                    <div class="name-text" id="textoNome"></div>
                </div>
            </div>
            
            <!-- Cartão Senha -->
            <div class="card" id="cardSenha">
                <div class="card-content">
                    <div class="card-title" style="margin-bottom: 6mm;">
                        <svg class="custom-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#1e3a8a" stroke-width="1.8">
                            <path d="M12 2 L13.5 5.5 L17 4.5 L18.5 8 L22 9.5 L20 13 L22 16.5 L18.5 18 L17 21.5 L13.5 20.5 L12 24 L10.5 20.5 L7 21.5 L5.5 18 L2 16.5 L4 13 L2 9.5 L5.5 8 L7 4.5 L10.5 5.5 Z" />
                            <circle cx="12" cy="12" r="4" />
                            <polygon points="10,9 17,12 10,15" fill="#1e3a8a" />
                        </svg>
                    </div>
                    <svg id="barcodeSenha" class="barcode"></svg>
                    <div class="senha-mascarada" id="textoSenhaMascarada">********</div>
                </div>
            </div>
            
            <p><strong>Dica:</strong> Ctrl + P → Papel A4 → Sem margens</p>
        </div>

        <div class="footer">
            <strong>por Ricardo.dev</strong> — Gerador de Credenciais em Code 128
        </div>
    </div>

    <script>
        function gerarCredenciais() {
            let nome = document.getElementById("nome").value.trim();
            const senha = document.getElementById("senha").value.trim();
            
            if (!nome || !senha) return alert("Preencha Nome e Senha!");
            
            nome = nome.toUpperCase();
            document.getElementById("textoNome").textContent = nome;
            document.getElementById("textoSenhaMascarada").textContent = "*".repeat(Math.max(senha.length, 8));

            JsBarcode("#barcodeNome", nome, { format: "CODE128", width: 2.3, height: 32, displayValue: false, margin: 10 });
            JsBarcode("#barcodeSenha", senha, { format: "CODE128", width: 2.3, height: 32, displayValue: false, margin: 10 });

            document.getElementById("printArea").style.display = "block";
            document.getElementById("printArea").scrollIntoView({ behavior: "smooth" });
        }

        document.getElementById("senha").addEventListener("keypress", e => {
            if (e.key === "Enter") gerarCredenciais();
        });
    </script>
</body>
</html>
